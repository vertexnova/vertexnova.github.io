# Build all WebGPU samples from the private vnerhi source repo and
# commit the WASM artifacts to Git LFS under public/wasm/.
#
# Trigger this manually whenever new or updated samples are ready to ship.
# The push to main then triggers deploy.yml, which checks out LFS files
# and deploys the site.
#
# Required secret:
#   VNERHI_TOKEN — PAT (classic) with "repo" scope on vertexnova/vnerhi,
#                  or a fine-grained PAT with "Contents: Read" on that repo.

name: Build WebGPU Samples

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-samples
  cancel-in-progress: false

jobs:
  build-wasm:
    name: "Build WASM samples → Git LFS"
    runs-on: ubuntu-latest

    steps:
      # ── Checkout this repo (site source) ──────────────────────────────
      - name: Checkout vertexnova.github.io
        uses: actions/checkout@v4
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Checkout private vnerhi source ────────────────────────────────
      - name: Use HTTPS for GitHub submodule fetch
        run: |
          git config --global --add url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://github.com/".insteadOf "ssh://git@github.com/"

      - name: Checkout vnerhi (private)
        uses: actions/checkout@v4
        with:
          repository: vertexnova/vnerhi
          token: ${{ secrets.VNERHI_TOKEN }}
          submodules: recursive
          path: _vnerhi

      # ── Emscripten setup ──────────────────────────────────────────────
      - name: Install Ninja
        run: sudo apt-get update -qq && sudo apt-get install -y ninja-build

      - name: Install Emscripten
        uses: mymindstorm/setup-emscripten@v14

      - name: Cache Emscripten ports (emdawnwebgpu)
        uses: actions/cache@v4
        with:
          path: ${{ env.EMSDK }}/upstream/emscripten/cache
          key: em-ports-${{ runner.os }}-${{ hashFiles('_vnerhi/scripts/ci_prefetch_emdawnwebgpu.sh') }}
          restore-keys: em-ports-${{ runner.os }}-

      - name: Pre-fetch emdawnwebgpu port
        run: bash _vnerhi/scripts/ci_prefetch_emdawnwebgpu.sh

      # ── Build ─────────────────────────────────────────────────────────
      - name: Configure CMake (Release · Samples ON · WebGPU)
        run: |
          emcmake cmake -G Ninja \
            -B _vnerhi/build/wasm/static/Release \
            -S _vnerhi \
            -DCMAKE_BUILD_TYPE=Release          \
            -DVNE_RHI_LIB_TYPE=static           \
            -DVNE_RHI_DEV=OFF                   \
            -DVNE_RHI_TESTS=OFF                 \
            -DVNE_RHI_SAMPLES=ON                \
            -DVNE_RHI_BACKEND_WEBGPU=ON         \
            -DVNE_TARGET_PLATFORM=Web           \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_CXX_STANDARD=20             \
            -DCMAKE_CXX_STANDARD_REQUIRED=ON    \
            -DCMAKE_CXX_EXTENSIONS=OFF

      - name: Build
        run: emmake cmake --build _vnerhi/build/wasm/static/Release --parallel "$(nproc)"

      - name: Summarise artifacts
        run: |
          BIN=_vnerhi/build/wasm/static/Release/bin
          COUNT=$(ls "$BIN"/*.html 2>/dev/null | wc -l | tr -d ' ')
          TOTAL=$(du -sh "$BIN" | cut -f1)
          echo "Built $COUNT samples · total $TOTAL"
          echo "## WASM build" >> "$GITHUB_STEP_SUMMARY"
          echo "| Sample | .wasm size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-----------|" >> "$GITHUB_STEP_SUMMARY"
          for f in "$BIN"/*.wasm; do
            name=$(basename "$f" .wasm)
            size=$(du -sh "$f" | cut -f1)
            echo "| \`$name\` | $size |" >> "$GITHUB_STEP_SUMMARY"
          done

      # ── Copy WASM files into the Astro public directory ───────────────
      - name: Copy WASM artifacts → public/wasm/
        run: |
          mkdir -p public/wasm
          # Replace previous sample set so deleted samples disappear from LFS too
          find public/wasm -mindepth 1 -delete
          cp _vnerhi/build/wasm/static/Release/bin/* public/wasm/
          rm -rf _vnerhi

      # ── Commit public/wasm via Git LFS ────────────────────────────────
      # Pushing to main triggers deploy.yml, which pulls LFS and publishes.
      - name: Commit WASM samples to Git LFS
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git lfs install --local
          git add public/wasm .gitattributes
          if git diff --cached --quiet; then
            echo "No WASM changes to commit."
            echo "- LFS commit: **none** (no changes)" >> "$GITHUB_STEP_SUMMARY"
          else
            COUNT=$(ls public/wasm/*.html 2>/dev/null | wc -l | tr -d ' ')
            git commit -m "chore: update WebGPU sample WASM artifacts ($COUNT samples, LFS)"
            git push
            echo "- LFS commit: **pushed** ($COUNT samples)" >> "$GITHUB_STEP_SUMMARY"
          fi
