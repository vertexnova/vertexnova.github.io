name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_wasm:
        description: "Skip LFS pull for WASM samples (site-only deploy)"
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Skip LFS when doing a site-only deploy; otherwise pull public/wasm.
          lfs: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_wasm) }}

      # ── Astro build ───────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install
      - run: npx astro check
      - run: npm run build

      - name: Deploy summary
        run: |
          W=$(find dist/wasm -name "*.html" 2>/dev/null | wc -l | tr -d ' ')
          echo "## Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- WASM samples: **${W:-0}**" >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
